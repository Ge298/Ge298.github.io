<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BART 实验</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; }
#balloon-area {
  width: 500px;
  height: 500px;
  margin: 20px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background-color: transparent;
}
#balloon, #fixation {
  position: absolute;
}
#balloon {
  width: 100px;
  height: 180px;
  display: none;
}
#fixation {
  font-size: 48px;
  font-weight: bold;
  display: none;
}
#score {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 10px 0;
}
.score-item { display: flex; align-items: center; }
.score-item span { margin-left: 5px; }
#trial-counter { margin: 10px 0; font-weight: bold; }
input { text-align:center; font-size:16px; padding:5px; }
button { padding:8px 20px; font-size:16px; margin-top:10px; }
</style>
</head>
<body>

<!-- 步骤 1: 参与者编号 -->
<div id="step1">
<h2>请输入参与者编号</h2>
<input type="text" id="subID"><br>
<button onclick="nextStep1()">下一步</button>
</div>

<!-- 步骤 2: 指导语 -->
<div id="step2" style="display:none">
<h2>指导语</h2>
<p>这里是指导语内容</p>
<button onclick="nextStep2()">下一步</button>
</div>

<!-- 步骤 3: 是否同意 -->
<div id="step3" style="display:none">
<h2>是否同意开展实验？</h2>
<button onclick="agree()">是</button>
<button onclick="disagree()">否</button>
</div>

<!-- 步骤 4: 开始练习 -->
<div id="step4" style="display:none">
<h2>谢谢您的参与，下面开始练习</h2>
<button onclick="startExperiment('practice')">开始练习</button>
</div>

<!-- 实验区域 -->
<div id="experiment" style="display:none">
<div id="score">
<div class="score-item">临时积分: <span id="tempScore">0</span></div>
<div class="score-item">永久积分: <span id="permScore">0</span></div>
</div>
<div id="trial-counter">0/0</div>
<div id="balloon-area">
<div id="fixation">+</div>
<img id="balloon" src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png" alt="气球">
</div>
<p>按 F 充气，按 J 收集积分</p>
</div>

<!-- 实验结束显示 -->
<div id="experiment-end" style="display:none">
<h2>实验结束</h2>
</div>

<script>
// ---------------- 全局参数 ----------------
let subID = "";
const pumpIncrease = 0.02;
const tempIncrease = 5;
const explodeRange = 32;

// ---------------- 状态变量 ----------------
let currentMode = ""; // 'practice' 或 'formal'
let totalTrials = 0;
let currentTrial = 0;
let tempScore = 0;
let permScore = 0;
let balloonWidth = 100;
let balloonHeight = 180;
let balloonExploded = false;

// ---------------- 步骤控制 ----------------
function nextStep1() {
  subID = document.getElementById("subID").value;
  if(!subID) { alert("请输入编号"); return; }
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}
function nextStep2() {
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}
function agree() {
  document.getElementById("step3").style.display = "none";
  document.getElementById("step4").style.display = "block";
}
function disagree() { alert("您不同意参加实验，实验结束"); }

// ---------------- 实验流程 ----------------
function startExperiment(mode){
  currentMode = mode;
  document.getElementById("step4").style.display = "none";
  document.getElementById("experiment").style.display = "block";

  // 根据模式设置总试次
  totalTrials = mode === 'practice' ? 10 : 30;
  currentTrial = 0;
  tempScore = 0;
  permScore = 0;
  updateScore();
  updateTrialCounter();
  nextTrial();
}

// 显示十字 -> 气球 -> 操作/结果
function nextTrial(){
  if(currentTrial >= totalTrials){
    document.getElementById("experiment").style.display = "none";
    document.getElementById("experiment-end").style.display = "block";
    return;
  }

  const fix = document.getElementById("fixation");
  const balloon = document.getElementById("balloon");

  // 显示十字
  fix.style.display = "block";
  balloon.style.display = "none";
  balloonWidth = 100;
  balloonHeight = 180;
  balloonExploded = false;
  balloon.src = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png";
  updateBalloonSize();

  setTimeout(()=>{
    // 十字消失，显示气球
    fix.style.display = "none";
    balloon.style.display = "block";
  }, 1000);
}

// ---------------- 按键事件 ----------------
document.addEventListener('keyup', keyHandler);

function keyHandler(event){
  const balloon = document.getElementById("balloon");
  if(balloon.style.display === "none") return; // 十字或爆炸不响应
  if(balloonExploded) return;

  if(event.key === "f" || event.key === "F") pumpBalloon();
  else if(event.key === "j" || event.key === "J") cashOutBalloon();
}

function pumpBalloon(){
  const balloon = document.getElementById("balloon");
  let explodeCheck = Math.floor(Math.random()*explodeRange)+1;
  if(explodeCheck === 1){
    balloonExploded = true;
    balloon.src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/explode.png";
    balloon.style.width="150px";
    balloon.style.height="150px";
    tempScore = 0;
    updateScore();
    setTimeout(()=>{
      currentTrial++;
      updateTrialCounter();
      nextTrial();
    },1500);
  } else {
    balloonWidth *= (1+pumpIncrease);
    balloonHeight *= (1+pumpIncrease);
    balloon.style.width = balloonWidth+"px";
    balloon.style.height = balloonHeight+"px";
    tempScore += tempIncrease;
    updateScore();
  }
}

function cashOutBalloon(){
  permScore += tempScore;
  tempScore = 0;
  updateScore();
  currentTrial++;
  updateTrialCounter();
  nextTrial();
}

// ---------------- UI 更新 ----------------
function updateScore(){
  document.getElementById("tempScore").innerText = tempScore;
  document.getElementById("permScore").innerText = permScore;
}

function updateTrialCounter(){
  document.getElementById("trial-counter").innerText = `${currentMode==='practice'?'练习':'正式实验'}：${currentTrial}/${totalTrials}`;
}

function updateBalloonSize(){
  const balloon = document.getElementById("balloon");
  balloon.style.width = balloonWidth+"px";
  balloon.style.height = balloonHeight+"px";
}
</script>
</body>
</html>
