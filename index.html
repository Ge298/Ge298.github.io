<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tetris Test</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  background: #111;
  margin-top: 20px;
  border: 2px solid white;
}
</style>

</head>
<body>

<h1>Tetris Test</h1>
<p>Use ← → ↓ ↑ keys</p >

<canvas id="game" width="240" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scale = 20;
ctx.scale(scale, scale);

const arena = createMatrix(12, 20);

const player = {
  pos: {x: 0, y: 0},
  matrix: null
};

function createMatrix(w, h) {
  const matrix = [];
  while (h--) {
    matrix.push(new Array(w).fill(0));
  }
  return matrix;
}

function createPiece() {
  return [
    [1,1,1],
    [0,1,0]
  ];
}

function drawMatrix(matrix, offset) {
  matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        ctx.fillStyle = "red";
        ctx.fillRect(
          x + offset.x,
          y + offset.y,
          1,
          1
        );
      }
    });
  });
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMatrix(arena, {x:0, y:0});
  drawMatrix(player.matrix, player.pos);
}

function update() {
  player.pos.y++;

  if (collide()) {
    player.pos.y--;
    merge();
    playerReset();
  }

  draw();
}

function collide() {
  const m = player.matrix;
  const o = player.pos;

  for (let y = 0; y < m.length; y++) {
    for (let x = 0; x < m[y].length; x++) {

      if (
        m[y][x] !== 0 &&
        (arena[y + o.y] &&
         arena[y + o.y][x + o.x]) !== 0
      ) {
        return true;
      }

    }
  }

  return false;
}

function merge() {
  player.matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        arena[y + player.pos.y][x + player.pos.x] = value;
      }
    });
  });
}

function playerReset() {
  player.matrix = createPiece();
  player.pos.y = 0;
  player.pos.x = 5;
}

document.addEventListener("keydown", e => {

  if (e.key === "ArrowLeft") {
    player.pos.x--;
  }

  if (e.key === "ArrowRight") {
    player.pos.x++;
  }

  if (e.key === "ArrowDown") {
    update();
  }

});

playerReset();

setInterval(update, 500);

</script>

</body>
</html>
