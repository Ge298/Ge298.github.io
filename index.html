<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BART气球实验示例</title>
<style>
body { font-family: Arial; text-align: center; }

#balloon-area {
  width: 500px; height: 500px; margin: 20px auto;
  position: relative;
  display: flex; justify-content: center; align-items: center;
}

#balloon, #explode, #fixation {
  position: absolute;
}

#balloon, #explode {
  width: 100px; height: 180px;
  display: none;
}

#fixation {
  font-size: 48px; font-weight: bold;
  display: none;
}

#score {
  display: flex; justify-content: center; gap: 20px;
}

#trial-counter {
  margin: 10px; font-weight: bold;
}
</style>
</head>
<body>

<div id="step1">
<h2>欢迎参与心理学实验,请输入参与者编号:</h2>
<input id="subID"><br>
<button onclick="nextStep1()">下一步</button>
</div>

<div id="step2" style="display:none;">
<p>
在这个任务中，你将看见一个气球。<br>
按 F 键 给气球充气，每按一次会使气球变大，并获得积分。<br>
气球可能在任意一次充气时爆炸，如果爆炸，则本轮积分全部失去。<br>
按 J 键停止充气并收集积分。<br>
练习阶段用于熟悉操作规则，不计入正式实验总分。
</p >
<button onclick="nextStep2()">下一步</button>
</div>

<div id="step3" style="display:none">
<h2>是否同意参加实验？</h2>
<button onclick="agree()">是</button>
<button onclick="disagree()">否</button>
</div>

<div id="step4" style="display:none">
<h2>开始练习</h2>
<button onclick="startExperiment()">开始</button>
</div>

<div id="experiment" style="display:none">
<div id="score">
  <div>临时积分: <span id="tempScore">0</span></div>
  <div>总积分: <span id="totalScore">0</span></div>
</div>
<div id="trial-counter"></div>

<div id="balloon-area">
  <div id="fixation">+</div>
  < img id="balloon">
  < img id="explode">
</div>

<p>F=充气 J=收集</p >
</div>

<div id="end" style="display:none">
<h2>实验结束</h2>
<p id="finalText"></p >
<button id="downloadCSV">下载指标数据</button>
<br><br>
<button id="downloadTimeCSV">下载按键数据</button>
</div>

<script>
// ================== 基本参数 ==================
let subID = "";
let phase = "practice";
let trialIndex = 0;
let trialTotal = 10;
const practiceTotal = 10;
const formalTotal = 20;

let tempScore = 0;
let totalScore_practice = 0;
let totalScore_formal = 0;
let totalScore = 0;

let pumpCount = 0;
let balloonSize = 1;
const pumpIncrease = 0.04;
let explosionPoint = 0;

let trialStartTime = 0;
let expStartTime = 0;
let keyPressed = false;

// ================== 数据记录 ==================
let trialData = [];
let keyData = [];

// ================== 图片预加载（本地路径版） ==================
const images = {};
["balloon","explode"].forEach(name=>{
  images[name] = new Image();
  images[name].src = `${name}.png`;  // ✅ 本地加载
});

// ================== 步骤控制 ==================
function nextStep1(){
  subID = document.getElementById("subID").value;
  if(!subID){alert("请输入编号"); return;}
  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
}

function nextStep2(){
  document.getElementById("step2").style.display="none";
  document.getElementById("step3").style.display="block";
}

function agree(){
  document.getElementById("step3").style.display="none";
  document.getElementById("step4").style.display="block";
}

function disagree(){
  alert("实验结束");
}

// ================== 开始实验 ==================
function startExperiment(){
  expStartTime = Date.now();

  // ✅ 提前加载图片（防卡顿）
  document.getElementById("balloon").src = images["balloon"].src;
  document.getElementById("explode").src = images["explode"].src;

  phase = "practice";
  trialTotal = practiceTotal;
  trialIndex = 0;

  document.getElementById("step4").style.display="none";
  document.getElementById("experiment").style.display="block";

  nextTrial();
}

// ================== 试次控制 ==================
function nextTrial(){
  if(trialIndex >= trialTotal){
    if(phase==="practice"){
      phase="formal";
      trialTotal = formalTotal;
      trialIndex = 0;
      alert("练习结束，进入正式实验");
      nextTrial();
      return;
    } else {
      endExperiment();
      return;
    }
  }

  tempScore = 0;
  pumpCount = 0;
  balloonSize = 1;
  explosionPoint = Math.floor(Math.random()*32)+1;

  updateUI();

  document.getElementById("balloon").style.display="none";
  document.getElementById("explode").style.display="none";
  document.getElementById("fixation").style.display="block";

  setTimeout(()=>{
    document.getElementById("fixation").style.display="none";

    const balloon = document.getElementById("balloon");
    balloon.style.display="block";
    balloon.style.transform = "scale(1)";

    trialStartTime = performance.now();
    document.addEventListener("keydown", keyHandler);
  }, 1000);
}

// ================== 按键 ==================
function keyHandler(e){
  if(!["f","F","j","J"].includes(e.key)) return;
  if(keyPressed) return;
  keyPressed = true;

  const rt = performance.now() - trialStartTime;

  keyData.push({
    subID, phase, trial: trialIndex+1,
    key: e.key, rt: rt.toFixed(2),
    time: Date.now()
  });

  const balloon = document.getElementById("balloon");
  const explode = document.getElementById("explode");

  if(e.key==="f"||e.key==="F"){
    balloonSize *= (1 + pumpIncrease);
    balloon.style.transform = `scale(${balloonSize})`;
    pumpCount++;
    tempScore += 5;
    updateUI();

    if(pumpCount >= explosionPoint){
      balloon.style.display="none";
      explode.style.display="block";

      document.removeEventListener("keydown", keyHandler);

      saveTrial(rt,1);

      setTimeout(()=>{
        explode.style.display="none";
        trialIndex++;
        nextTrial();
      }, 1500);
    }
  }

  if(e.key==="j"||e.key==="J"){
    if(phase==="practice"){
      totalScore_practice += tempScore;
      totalScore = totalScore_practice;
    } else {
      totalScore_formal += tempScore;
      totalScore = totalScore_formal;
    }

    saveTrial(rt,0);

    document.removeEventListener("keydown", keyHandler);
    balloon.style.display="none";

    trialIndex++;
    nextTrial();
  }
}

document.addEventListener("keyup", ()=>{ keyPressed=false; });

// ================== 数据 ==================
function saveTrial(rt, exploded){
  trialData.push({
    subID, phase, trial: trialIndex+1,
    pumpCount, exploded, tempScore, explosionPoint,
    rt: rt.toFixed(2)
  });
}

function updateUI(){
  document.getElementById("tempScore").innerText = tempScore;
  document.getElementById("totalScore").innerText = totalScore;
  document.getElementById("trial-counter").innerText = `${phase} ${trialIndex+1}/${trialTotal}`;
}

// ================== 结束 ==================
function endExperiment(){
  const totalTime = Date.now() - expStartTime;

  document.getElementById("experiment").style.display="none";
  document.getElementById("end").style.display="block";

  document.getElementById("finalText").innerText =
    `总积分：${totalScore} ｜ 总时间：${(totalTime/1000).toFixed(2)}秒`;

  let csv1=`TotalTime(s),${(totalTime/1000).toFixed(2)}\n`;
  csv1+= "subID,phase,trial,pumpCount,exploded,tempScore,explosionPoint,rt\n";

  trialData.forEach(d=>{
    csv1+=`${d.subID},${d.phase},${d.trial},${d.pumpCount},${d.exploded},${d.tempScore},${d.explosionPoint},${d.rt}\n`;
  });

  document.getElementById("downloadCSV").onclick=()=>{
    const a=document.createElement("a");
    a.href=encodeURI("data:text/csv;charset=utf-8,"+csv1);
    a.download=`trial_${subID}.csv`;
    a.click();
  };

  let csv2="subID,phase,trial,key,rt,time\n";
  keyData.forEach(d=>{
    csv2+=`${d.subID},${d.phase},${d.trial},${d.key},${d.rt},${d.time}\n`;
  });

  document.getElementById("downloadTimeCSV").onclick=()=>{
    const a=document.createElement("a");
    a.href=encodeURI("data:text/csv;charset=utf-8,"+csv2);
    a.download=`time_${subID}.csv`;
    a.click();
  };
}
</script>
</body>
</html>
