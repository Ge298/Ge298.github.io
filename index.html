<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Tetris Test</title>
<style>
  body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; }
  canvas { background: #222; border: 2px solid #fff; }
</style>
</head>
<body>
<canvas id="tetris" width="240" height="400"></canvas>
<script>
const canvas = document.getElementById('tetris');
const ctx = canvas.getContext('2d');
const scale = 20; // 每个方块大小
const rows = canvas.height / scale;
const cols = canvas.width / scale;

// 创建空矩阵
function createMatrix(w, h) {
    const matrix = [];
    while(h--) matrix.push(new Array(w).fill(0));
    return matrix;
}

// 方块形状
const pieces = [
  [[1,1,1,1]], // I
  [[2,2],[2,2]], // O
  [[0,3,0],[3,3,3]], // T
  [[0,4,4],[4,4,0]], // S
  [[5,5,0],[0,5,5]], // Z
  [[6,0,0],[6,6,6]], // J
  [[0,0,7],[7,7,7]]  // L
];

// 随机生成方块
function randomPiece() {
    const p = pieces[Math.floor(Math.random() * pieces.length)];
    return {matrix:p, pos:{x:Math.floor(cols/2)-Math.floor(p[0].length/2), y:0}};
}

// 绘制矩阵
function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if(value !== 0) {
                ctx.fillStyle = 'hsl(' + (value*50) + ',70%,50%)';
                ctx.fillRect((x+offset.x)*scale, (y+offset.y)*scale, scale-1, scale-1);
            }
        });
    });
}

// 检测碰撞
function collide(arena, player) {
    const m = player.matrix;
    const o = player.pos;
    for(let y=0;y<m.length;y++){
        for(let x=0;x<m[y].length;x++){
            if(m[y][x] && (arena[y+o.y] && arena[y+o.y][x+o.x]) !== 0) return true;
        }
    }
    return false;
}

// 合并方块到场地
function merge(arena, player) {
    player.matrix.forEach((row,y)=>{
        row.forEach((value,x)=>{
            if(value) arena[y+player.pos.y][x+player.pos.x] = value;
        });
    });
}

// 场地清行
function sweep() {
    outer: for(let y=arena.length-1;y>=0;y--){
        if(arena[y].every(val=>val!==0)){
            arena.splice(y,1);
            arena.unshift(new Array(cols).fill(0));
            y++;
        }
    }
}

const arena = createMatrix(cols, rows);
let player = randomPiece();
let dropCounter = 0;
let dropInterval = 500;
let lastTime = 0;

function update(time=0){
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if(dropCounter > dropInterval){
        player.pos.y++;
        if(collide(arena, player)){
            player.pos.y--;
            merge(arena, player);
            sweep();
            player = randomPiece();
            if(collide(arena, player)) arena.forEach(row=>row.fill(0)); // Game over: 清空
        }
        dropCounter = 0;
    }
    draw();
    requestAnimationFrame(update);
}

function draw(){
    ctx.fillStyle = '#222';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawMatrix(arena, {x:0,y:0});
    drawMatrix(player.matrix, player.pos);
}

document.addEventListener('keydown', event=>{
    if(event.key === 'ArrowLeft'){
        player.pos.x--;
        if(collide(arena, player)) player.pos.x++;
    }
    else if(event.key === 'ArrowRight'){
        player.pos.x++;
        if(collide(arena, player)) player.pos.x--;
    }
    else if(event.key === 'ArrowDown'){
        player.pos.y++;
        if(collide(arena, player)) player.pos.y--;
    }
    else if(event.key === 'ArrowUp'){ // 旋转
        const m = player.matrix;
        for(let y=0;y<m.length;y++){
            for(let x=0;x<y;x++){
                [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
            }
        }
        m.forEach(row => row.reverse());
        if(collide(arena, player)) {
            for(let i=0;i<3;i++){ // 旋转回去
                for(let y=0;y<m.length;y++){
                    for(let x=0;x<y;x++){
                        [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
                    }
                }
                m.forEach(row => row.reverse());
            }
        }
    }
});

update();
</script>
</body>
</html>
