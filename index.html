<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BART 实验</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; }
#balloon-area, #balloon-area-formal {
width: 500px;
height: 500px;
margin: 20px auto;
display: flex;
align-items: center;
justify-content: center;
position: relative;
background-color: transparent;
}
#balloon, #balloonFormal {
width: 100px;
height: 180px;
}
#score, #scoreFormal {
display: flex;
justify-content: center;
gap: 20px;
margin: 10px 0;
}
.score-item {
display: flex;
align-items: center;
}
.score-item span { margin-left: 5px; }
#trial-counter, #trial-counter-formal { margin: 10px 0; font-weight: bold; }
input { text-align:center; font-size:16px; padding:5px; }
button { padding:8px 20px; font-size:16px; margin-top:10px; }
</style>
</head>
<body>

<!-- 步骤 1: 参与者编号 -->
<div id="step1">
<h2>请输入参与者编号</h2>
<input type="text" id="subID"><br>
<button onclick="nextStep1()">下一步</button>
</div>

<!-- 步骤 2: 指导语 -->
<div id="step2" style="display:none">
<h2>指导语</h2>
<p>这里是指导语内容</p>
<button onclick="nextStep2()">下一步</button>
</div>

<!-- 步骤 3: 是否同意 -->
<div id="step3" style="display:none">
<h2>是否同意开展实验？</h2>
<button onclick="agree()">是</button>
<button onclick="disagree()">否</button>
</div>

<!-- 步骤 4: 开始练习 -->
<div id="step4" style="display:none">
<h2>谢谢您的参与，下面开始练习</h2>
<button onclick="startPractice()">开始练习</button>
</div>

<!-- 练习实验 -->
<div id="practice" style="display:none">
<div id="score">
<div class="score-item">临时积分: <span id="tempScore">0</span></div>
<div class="score-item">永久积分: <span id="permScore">0</span></div>
</div>
<div id="trial-counter">练习：0/10</div>
<div id="balloon-area">
<img id="balloon" src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png" alt="气球">
</div>
<p>按 F 充气，按 J 收集积分</p>
</div>

<!-- 练习结束确认 -->
<div id="practice-end" style="display:none">
<h2>练习结束</h2>
<button onclick="startFormalExperiment()">确认开始正式实验</button>
</div>

<!-- 正式实验 -->
<div id="formal" style="display:none">
<div id="scoreFormal">
<div class="score-item">临时积分: <span id="tempScoreFormal">0</span></div>
<div class="score-item">永久积分: <span id="permScoreFormal">0</span></div>
</div>
<div id="trial-counter-formal">正式实验：0/30</div>
<div id="balloon-area-formal">
<img id="balloonFormal" src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png" alt="气球">
</div>
<p>按 F 充气，按 J 收集积分</p>
</div>

<!-- 正式实验结束显示 -->
<div id="formal-end" style="display:none">
<h2>实验结束</h2>
</div>

<script>
// ----- 新增统计数组 -----
let practiceData = [];
let formalData = [];

// ----- 练习实验记录 -----
function practicePump() {
if(practiceTrial >= practiceTotal) return;

let pumpCount = balloonWidth / 100; // 临时计算充气次数（可用其他方式）
let tempBefore = tempScore;

let explodeCheck = Math.floor(Math.random() * explodeRange) + 1;
if(explodeCheck === 1) {
balloonExploded = true;
document.getElementById("balloon").src = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/explode.png"
document.getElementById("balloon").style.width = "150px"
document.getElementById("balloon").style.height = "150px"

// 记录数据
practiceData.push({
trialNumber: practiceTrial + 1,
pumpCount: Math.round(tempBefore / tempIncrease),
exploded: 1,
tempScoreBefore: tempBefore,
permScoreAfter: permScore
});

tempScore = 0;
updateScore();
practiceTrial++;
updateTrialCounter();
setTimeout(resetBalloon, 1000);
return;
}

balloonWidth *= (1 + pumpIncrease);
balloonHeight *= (1 + pumpIncrease);
document.getElementById("balloon").style.width = balloonWidth + "px"
document.getElementById("balloon").style.height = balloonHeight + "px"
tempScore += tempIncrease;
updateScore();
}

function practiceCashOut() {
if(practiceTrial >= practiceTotal) return;

// 记录数据
practiceData.push({
trialNumber: practiceTrial + 1,
pumpCount: Math.round(tempScore / tempIncrease),
exploded: 0,
tempScoreBefore: tempScore,
permScoreAfter: permScore + tempScore
});

permScore += tempScore;
tempScore = 0;
updateScore();
practiceTrial++;
updateTrialCounter();
resetBalloon();
}

// ----- 正式实验记录 -----
function formalPump() {
if(formalTrial >= formalTotal) return;

let tempBefore = tempScoreFormal;

let explodeCheck = Math.floor(Math.random() * explodeRange) + 1;
if(explodeCheck === 1) {
balloonExplodedFormal = true;
document.getElementById("balloonFormal").src = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/explode.png"
document.getElementById("balloonFormal").style.width = "150px"
document.getElementById("balloonFormal").style.height = "150px"

formalData.push({
trialNumber: formalTrial + 1,
pumpCount: Math.round(tempBefore / tempIncrease),
exploded: 1,
tempScoreBefore: tempBefore,
permScoreAfter: permScoreFormal
});

tempScoreFormal = 0;
updateScoreFormal();
formalTrial++;
updateTrialCounterFormal();
setTimeout(resetBalloonFormal, 1000);
checkFormalEnd();
return;
}

balloonWidthFormal *= (1 + pumpIncrease);
balloonHeightFormal *= (1 + pumpIncrease);
document.getElementById("balloonFormal").style.width = balloonWidthFormal + "px"
document.getElementById("balloonFormal").style.height = balloonHeightFormal + "px"
tempScoreFormal += tempIncrease;
updateScoreFormal();
}

function formalCashOut() {
if(formalTrial >= formalTotal) return;

formalData.push({
trialNumber: formalTrial + 1,
pumpCount: Math.round(tempScoreFormal / tempIncrease),
exploded: 0,
tempScoreBefore: tempScoreFormal,
permScoreAfter: permScoreFormal + tempScoreFormal
});

permScoreFormal += tempScoreFormal;
tempScoreFormal = 0;
updateScoreFormal();
formalTrial++;
updateTrialCounterFormal();
resetBalloonFormal();
checkFormalEnd();
}

// ----- 实验结束后导出 -----
function exportCSV(filename, rows) {
if(!rows || !rows.length) return;
const keys = Object.keys(rows[0]);
let csv = keys.join(",") + "\n"
rows.forEach(row => {
csv += keys.map(k => row[k]).join(",") + "\n"
});
const blob = new Blob([csv], {type: 'text/csv'});
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = filename;
a.click();
URL.revokeObjectURL(url);
}

// 在正式实验结束时显示总结和导出
function checkFormalEnd() {
if(formalTrial >= formalTotal){
document.getElementById("formal").style.display = "none"
document.getElementById("formal-end").style.display = "block"

// 总积分
const totalScore = permScoreFormal;
// 爆炸气球百分比
const explodedCount = formalData.filter(d => d.exploded===1).length;
const explodedPercent = ((explodedCount / formalData.length) * 100).toFixed(2);

const summaryDiv = document.getElementById("formal-end");
const summaryHTML = `<p>总积分: ${totalScore}</p>
<p>爆炸气球比例: ${explodedPercent}%</p>
<button onclick="downloadAllData()">下载数据</button>`;
summaryDiv.innerHTML += summaryHTML;
}
}

// 下载练习和正式数据
function downloadAllData() {
const participantID = subID;
// 为每行加上参与者编号
const practiceRows = practiceData.map(d => ({participantID, ...d}));
const formalRows = formalData.map(d => ({participantID, ...d}));

exportCSV("practice.csv", practiceRows);
exportCSV("formal.csv", formalRows);
}
</script>

</body>
</html>
