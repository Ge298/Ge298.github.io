<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BART 实验</title>

<style>
body { font-family: Arial; text-align: center; }

#balloon-area {
  width: 500px;
  height: 500px;
  margin: 20px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#balloon, #fixation {
  position: absolute;
}

#balloon {
  width: 100px;
  height: 180px;
  display: none;
}

#fixation {
  font-size: 48px;
  font-weight: bold;
  display: none;
}

#score {
  display: flex;
  justify-content: center;
  gap: 20px;
}

#trial-counter {
  margin: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- Step1 -->
<div id="step1">
<h2>请输入参与者编号</h2>
<input id="subID"><br>
<button onclick="nextStep1()">下一步</button>
</div>

<!-- Step2 -->
<div id="step2" style="display:none">
<h2>指导语</h2>
<p>按F充气，按J收集</p >
<button onclick="nextStep2()">下一步</button>
</div>

<!-- Step3 -->
<div id="step3" style="display:none">
<h2>是否同意参加实验？</h2>
<button onclick="agree()">是</button>
<button onclick="disagree()">否</button>
</div>

<!-- Step4 -->
<div id="step4" style="display:none">
<h2>开始练习</h2>
<button onclick="startExperiment()">开始</button>
</div>

<!-- 实验 -->
<div id="experiment" style="display:none">

<div id="score">
<div>临时积分: <span id="tempScore">0</span></div>
<div>总积分: <span id="totalScore">0</span></div>
</div>

<div id="trial-counter"></div>

<div id="balloon-area">
<div id="fixation">+</div>
< img id="balloon" src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png">
</div>

<p>F=充气 J=收集</p >

</div>

<!-- 结束 -->
<div id="end" style="display:none">
<h2>实验结束</h2>
<p id="finalText"></p >

<button id="downloadCSV">下载指标数据</button>
<br><br>
<button id="downloadTimeCSV">下载时间数据</button>
</div>

<script>

// ===== 基本变量 =====
let subID = "";
let phase = "practice";

let trialIndex = 0;
let trialTotal = 10;

const practiceTotal = 10;
const formalTotal = 30;

let tempScore = 0;
let totalScore = 0;
let pumpCount = 0;

let trialStartTime = 0;
let expStartTime = 0;

// 数据
let trialData = [];
let keyData = [];

// ===== 步骤 =====
function nextStep1(){
  subID = document.getElementById("subID").value;
  if(!subID){alert("请输入编号");return;}
  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
}

function nextStep2(){
  document.getElementById("step2").style.display="none";
  document.getElementById("step3").style.display="block";
}

function agree(){
  document.getElementById("step3").style.display="none";
  document.getElementById("step4").style.display="block";
}

function disagree(){
  alert("实验结束");
}

// ===== 开始实验 =====
function startExperiment(){

  expStartTime = Date.now();

  phase = "practice";
  trialTotal = practiceTotal;
  trialIndex = 0;
  totalScore = 0;

  document.getElementById("step4").style.display="none";
  document.getElementById("experiment").style.display="block";

  nextTrial();
}

// ===== 核心试次 =====
function nextTrial(){

  if(trialIndex >= trialTotal){

    if(phase==="practice"){
      phase="formal";
      trialTotal=formalTotal;
      trialIndex=0;
      alert("练习结束，进入正式实验");
      nextTrial();
      return;
    }

    if(phase==="formal"){
      endExperiment();
      return;
    }
  }

  tempScore = 0;
  pumpCount = 0;

  updateUI();

  document.getElementById("balloon").style.display="none";
  document.getElementById("fixation").style.display="block";

  setTimeout(()=>{
    document.getElementById("fixation").style.display="none";
    document.getElementById("balloon").style.display="block";

    trialStartTime = performance.now();

    document.addEventListener("keydown", keyHandler);

  },1000);
}

// ===== 按键 =====
function keyHandler(e){

  if(!["f","F","j","J"].includes(e.key)) return;

  let rt = performance.now() - trialStartTime;

  keyData.push({
    subID,phase,trial:trialIndex+1,
    key:e.key,rt:rt.toFixed(2),
    time:Date.now()
  });

  // F
  if(e.key==="f"||e.key==="F"){

    pumpCount++;
    tempScore+=5;
    updateUI();

    if(Math.floor(Math.random()*32)+1===1){

      document.getElementById("balloon").src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/explode.png";

      saveTrial(rt,1);

      document.removeEventListener("keydown", keyHandler);

      setTimeout(()=>{
        resetBalloon();
        trialIndex++;
        nextTrial();
      },1500);
    }
  }

  // J
  if(e.key==="j"||e.key==="J"){

    totalScore+=tempScore;

    saveTrial(rt,0);

    document.removeEventListener("keydown", keyHandler);

    resetBalloon();

    trialIndex++;
    nextTrial();
  }
}

// ===== 保存 =====
function saveTrial(rt,exploded){
  trialData.push({
    subID,phase,trial:trialIndex+1,
    pumpCount,exploded,totalScore,
    rt:rt.toFixed(2)
  });
}

// ===== UI =====
function updateUI(){
  document.getElementById("tempScore").innerText=tempScore;
  document.getElementById("totalScore").innerText=totalScore;
  document.getElementById("trial-counter").innerText=
    `${phase} ${trialIndex+1}/${trialTotal}`;
}

function resetBalloon(){
  document.getElementById("balloon").src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png";
}

// ===== 结束 =====
function endExperiment(){

  let totalTime = Date.now()-expStartTime;

  document.getElementById("experiment").style.display="none";
  document.getElementById("end").style.display="block";

  document.getElementById("finalText").innerText =
    `总积分：${totalScore} ｜ 总时间：${(totalTime/1000).toFixed(2)}秒`;

  // CSV1
  let csv1="subID,phase,trial,pump,exploded,totalScore,rt\n";
  trialData.forEach(d=>{
    csv1+=`${d.subID},${d.phase},${d.trial},${d.pumpCount},${d.exploded},${d.totalScore},${d.rt}\n`;
  });

  document.getElementById("downloadCSV").onclick=()=>{
    let a=document.createElement("a");
    a.href=encodeURI("data:text/csv;charset=utf-8,"+csv1);
    a.download=`trial_${subID}.csv`;
    a.click();
  };

  // CSV2
  let csv2="subID,phase,trial,key,rt,time\n";
  keyData.forEach(d=>{
    csv2+=`${d.subID},${d.phase},${d.trial},${d.key},${d.rt},${d.time}\n`;
  });

  document.getElementById("downloadTimeCSV").onclick=()=>{
    let a=document.createElement("a");
    a.href=encodeURI("data:text/csv;charset=utf-8,"+csv2);
    a.download=`time_${subID}.csv`;
    a.click();
  };
}

</script>

</body>
</html>
