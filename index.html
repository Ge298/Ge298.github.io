<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BART Experiment</title>

  <!-- jsPsych -->
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text"></script>

</head>
<body></body>

<script>

const jsPsych = initJsPsych({
  on_finish: function() {
    jsPsych.data.get().localSave('csv','bart_data.csv');
  }
});

// ===== 人口学 =====
const demo = {
  type: jsPsychSurveyText,
  questions: [
    {prompt: "你的年龄？", required: true},
    {prompt: "你的性别？", required: true}
  ]
};

// ===== 指导语 =====
const intro = {
  type: jsPsychHtmlButtonResponse,
  stimulus: "<p>你将进行气球任务。点击“充气”增加收益，但可能爆炸。</p>",
  choices: ["开始"]
};

// ===== BART函数 =====
function create_bart_trial() {

  let pumps = 0;
  let reward = 0;
  let explosion_point = Math.floor(Math.random()*64)+1;
  let finished = false;

  return {
    timeline: [
      {
        type: jsPsychHtmlButtonResponse,
        stimulus: function() {
          return `<p>充气次数: ${pumps}</p><p>奖励: ${reward}</p>`;
        },
        choices: ["充气", "收集"],
        loop_function: function(data){

          let last = data.values()[0];

          if(last.response == 0){
            pumps++;
            reward++;

            if(pumps >= explosion_point){
              finished = true;
              reward = 0;
              return false;
            }
            return true;

          } else {
            finished = true;
            return false;
          }
        }
      },
      {
        type: jsPsychHtmlButtonResponse,
        stimulus: function(){
          return reward == 0
            ? "<p>爆炸了！</p>"
            : `<p>你获得 ${reward}</p>`;
        },
        choices: ["继续"],
        data: {
          pumps: pumps,
          reward: reward,
          explosion_point: explosion_point
        }
      }
    ]
  };
}

// ===== timeline =====
let timeline = [];

timeline.push(demo);
timeline.push(intro);

// 30个气球
for(let i=0;i<30;i++){
  timeline.push(create_bart_trial());
}

// ===== 运行 =====
jsPsych.run(timeline);

</script>
</html>
