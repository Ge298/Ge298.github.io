<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BART 实验</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; }
  #balloon-area {
    width: 300px;
    height: 300px;
    margin: 20px auto;
    background-color: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #balloon {
    width: 100px;
    height: 200px;
  }
  #score {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
  }
  #trial-counter {
    margin: 10px 0;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="step1">
  <h2>请输入被试编号</h2>
  <input type="text" id="subID">
  <button onclick="nextStep1()">下一步</button>
</div>

<div id="step2" style="display:none">
  <h2>指导语</h2>
  <p>这里是指导语</p>
  <button onclick="nextStep2()">下一步</button>
</div>

<div id="step3" style="display:none">
  <h2>是否同意开展实验？</h2>
  <button onclick="agree()">是</button>
  <button onclick="disagree()">否</button>
</div>

<div id="step4" style="display:none">
  <h2>谢谢您的参与，下面开始实验</h2>
  <button onclick="startPractice()">开始实验</button>
</div>

<div id="practice" style="display:none">
  <div id="score">
    <div>临时积分: <span id="tempScore">0</span></div>
    <div>永久积分: <span id="permScore">0</span></div>
  </div>
  <div id="trial-counter">练习：0/10</div>
  <div id="balloon-area">
    <img id="balloon" src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png" alt="气球">
  </div>
  <p>按 F 充气，按 J 收集积分</p>
</div>

<div id="experiment-real" style="display:none">
  <div id="score-real">
    <div>临时积分: <span id="tempScoreReal">0</span></div>
    <div>永久积分: <span id="permScoreReal">0</span></div>
  </div>
  <div id="trial-counter-real">正式实验：0/30</div>
  <div id="balloon-area-real">
    <img id="balloonReal" src="https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png" alt="气球">
  </div>
  <p>按 F 充气，按 J 收集积分</p>
</div>

<div id="start-experiment-page" style="display:none">
  <h2>正式实验</h2>
  <button onclick="startExperimentReal()">确认</button>
</div>

<script>
let subID = "";
// 练习相关
let tempScore = 0;
let permScore = 0;
let balloonWidth = 100;
let balloonHeight = 200;
let pumpIncrease = 0.05;
let tempIncrease = 5;
let explodeRange = 30;
let balloonExploded = false;
let practiceTrial = 0;
const practiceTotal = 10;

// 正式实验相关
let tempScoreReal = 0;
let permScoreReal = 0;
let balloonWidthReal = 100;
let balloonHeightReal = 200;
let balloonExplodedReal = false;
let experimentTrial = 0;
const experimentTotal = 30;

function nextStep1() {
  subID = document.getElementById("subID").value;
  if(subID === "") { alert("请输入编号"); return; }
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function nextStep2() {
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}

function agree() {
  document.getElementById("step3").style.display = "none";
  document.getElementById("step4").style.display = "block";
}

function disagree() {
  alert("您不同意参加实验，实验结束");
}

// ------------------练习------------------
function startPractice() {
  document.getElementById("step4").style.display = "none";
  document.getElementById("practice").style.display = "block";
  practiceTrial = 0;
  updateTrialCounter();
  document.addEventListener('keyup', practiceKeyHandler);
  updateBalloonSize();
}

function practiceKeyHandler(event) {
  if(balloonExploded) return;
  if(event.key === "f" || event.key === "F") {
    practicePump();
  } else if(event.key === "j" || event.key === "J") {
    practiceCashOut();
  }
}

function practicePump() {
  let explodeCheck = Math.floor(Math.random() * explodeRange) + 1;
  if(explodeCheck === 1) {
    balloonExploded = true;
    let balloonImg = document.getElementById("balloon");
    balloonImg.src = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/explode.png";
    balloonImg.style.width = "150px";
    balloonImg.style.height = "150px";
    tempScore = 0;
    updateScore();
    practiceTrial++;
    updateTrialCounter();
    setTimeout(resetBalloon, 1000);
    return;
  }
  balloonWidth *= (1 + pumpIncrease);
  balloonHeight *= (1 + pumpIncrease);
  document.getElementById("balloon").style.width = balloonWidth + "px";
  document.getElementById("balloon").style.height = balloonHeight + "px";
  tempScore += tempIncrease;
  updateScore();
}

function practiceCashOut() {
  permScore += tempScore;
  tempScore = 0;
  updateScore();
  practiceTrial++;
  updateTrialCounter();
  resetBalloon();
}

function updateScore() {
  document.getElementById("tempScore").innerText = tempScore;
  document.getElementById("permScore").innerText = permScore;
}

function updateTrialCounter() {
  document.getElementById("trial-counter").innerText = `练习：${practiceTrial}/${practiceTotal}`;
  if(practiceTrial >= practiceTotal) {
    document.getElementById("practice").style.display = "none";
    document.getElementById("start-experiment-page").style.display = "block";
  }
}

function resetBalloon() {
  balloonWidth = 100;
  balloonHeight = 200;
  balloonExploded = false;
  let balloonImg = document.getElementById("balloon");
  balloonImg.src = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png";
  balloonImg.style.width = balloonWidth + "px";
  balloonImg.style.height = balloonHeight + "px";
}

// ------------------正式实验------------------
function startExperimentReal() {
  document.getElementById("start-experiment-page").style.display = "none";
  document.getElementById("experiment-real").style.display = "block";
  experimentTrial = 0;
  updateTrialCounterReal();
  document.addEventListener('keyup', experimentKeyHandler);
  updateBalloonSizeReal();
}

function experimentKeyHandler(event) {
  if(balloonExplodedReal) return;
  if(event.key === "f" || event.key === "F") {
    experimentPump();
  } else if(event.key === "j" || event.key === "J") {
    experimentCashOut();
  }
}

function experimentPump() {
  let explodeCheck = Math.floor(Math.random() * explodeRange) + 1;
  if(explodeCheck === 1) {
    balloonExplodedReal = true;
    let balloonImg = document.getElementById("balloonReal");
    balloonImg.src = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/explode.png";
    balloonImg.style.width = "150px";
    balloonImg.style.height = "150px";
    tempScoreReal = 0;
    updateScoreReal();
    experimentTrial++;
    updateTrialCounterReal();
    setTimeout(resetBalloonReal, 1000);
    return;
  }
  balloonWidthReal *= (1 + pumpIncrease);
  balloonHeightReal *= (1 + pumpIncrease);
  updateBalloonSizeReal();
  tempScoreReal += tempIncrease;
  updateScoreReal();
}

function experimentCashOut() {
  permScoreReal += tempScoreReal;
  tempScoreReal = 0;
  updateScoreReal();
  experimentTrial++;
  updateTrialCounterReal();
  resetBalloonReal();
}

function updateScoreReal() {
  document.getElementById("tempScoreReal").innerText = tempScoreReal;
  document.getElementById("permScoreReal").innerText = permScoreReal;
}

function updateTrialCounterReal() {
  document.getElementById("trial-counter-real").innerText = `正式实验：${experimentTrial}/${experimentTotal}`;
}

function updateBalloonSizeReal() {
  let balloonImg = document.getElementById("balloonReal");
  balloonImg.style.width = balloonWidthReal + "px";
  balloonImg.style.height = balloonHeightReal + "px";
}

function resetBalloonReal() {
  balloonWidthReal = 100;
  balloonHeightReal = 200;
  balloonExplodedReal = false;
  let balloonImg = document.getElementById("balloonReal");
  balloonImg.src = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png";
  updateBalloonSizeReal();
}
</script>

</body>
</html>
