<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BART实验</title>
<style>
body { font-family: Arial; text-align: center; }

#balloon-area {
  width: 500px; height: 500px;
  margin: 20px auto;
  position: relative;
  display: flex; justify-content: center; align-items: center;
}

#balloon, #explode, #fixation {
  position: absolute;
}

#balloon, #explode {
  width: 100px; height: 180px;
  display: none;
}

#fixation {
  font-size: 48px;
  display: none;
}

#score {
  display: flex;
  justify-content: center;
  gap: 20px;
}
</style>
</head>

<body>

<!-- 步骤 -->
<div id="step1">
<h2>请输入编号</h2>
<input id="subID">
<br><br>
<button onclick="nextStep1()">下一步</button>
</div>

<div id="step2" style="display:none;">
<p>
F键充气（+5分）<br>
J键收集<br>
气球可能爆炸
</p >
<button onclick="nextStep2()">下一步</button>
</div>

<div id="step3" style="display:none;">
<button onclick="startExperiment()">开始实验</button>
</div>

<!-- 实验 -->
<div id="experiment" style="display:none">

<div id="score">
  <div>临时积分: <span id="tempScore">0</span></div>
  <div>总积分: <span id="totalScore">0</span></div>
</div>

<div id="trialText"></div>

<div id="balloon-area">
  <div id="fixation">+</div>
  < img id="balloon">
  < img id="explode">
</div>

<p>F=充气 ｜ J=收集</p >

</div>

<!-- 结束 -->
<div id="end" style="display:none">
<h2>实验结束</h2>
<button onclick="downloadTrial()">下载trial数据</button>
<button onclick="downloadKey()">下载按键数据</button>
</div>

<script>

// ===== 图片（在线）=====
const balloonURL = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/balloon.png";
const explodeURL = "https://raw.githubusercontent.com/Ge298/Ge298.github.io/main/explode.png";

// ===== 参数 =====
let subID="";
let phase="practice";
let trial=0;
let totalTrial=10;
let practiceTrial=10;
let formalTrial=20;

let tempScore=0;
let totalScore=0;

let pump=0;
let size=1;
let explosion=0;

let startTime=0;

// ===== 数据 =====
let trialData=[];
let keyData=[];

// ===== 步骤 =====
function nextStep1(){
  subID=document.getElementById("subID").value;
  if(!subID){alert("请输入编号");return;}
  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
}

function nextStep2(){
  document.getElementById("step2").style.display="none";
  document.getElementById("step3").style.display="block";
}

// ===== 开始 =====
function startExperiment(){

  // ✅ 加载在线图片
  document.getElementById("balloon").src = balloonURL;
  document.getElementById("explode").src = explodeURL;

  document.getElementById("step3").style.display="none";
  document.getElementById("experiment").style.display="block";

  phase="practice";
  totalTrial=practiceTrial;
  trial=0;

  nextTrial();
}

// ===== 试次 =====
function nextTrial(){

  if(trial>=totalTrial){

    if(phase==="practice"){
      alert("练习结束，进入正式实验");
      phase="formal";
      totalTrial=formalTrial;
      trial=0;
      nextTrial();
      return;
    }

    endExperiment();
    return;
  }

  tempScore=0;
  pump=0;
  size=1;
  explosion=Math.floor(Math.random()*32)+1;

  updateUI();

  document.getElementById("balloon").style.display="none";
  document.getElementById("explode").style.display="none";
  document.getElementById("fixation").style.display="block";

  setTimeout(()=>{
    document.getElementById("fixation").style.display="none";

    let b=document.getElementById("balloon");
    b.style.display="block";
    b.style.transform="scale(1)";

    startTime=performance.now();

  },1000);
}

// ===== 键盘 =====
document.addEventListener("keydown",function(e){

  let b=document.getElementById("balloon");
  let ex=document.getElementById("explode");

  if(e.key==="f"||e.key==="F"){

    pump++;
    size*=1.04;
    tempScore+=5;

    b.style.transform=`scale(${size})`;
    updateUI();

    if(pump>=explosion){

      b.style.display="none";
      ex.style.display="block";

      trialData.push({
        subID,phase,trial:trial+1,
        pump,explosion,earn:0
      });

      setTimeout(()=>{
        trial++;
        nextTrial();
      },1500);
    }
  }

  if(e.key==="j"||e.key==="J"){

    totalScore+=tempScore;

    trialData.push({
      subID,phase,trial:trial+1,
      pump,explosion,earn:tempScore
    });

    trial++;
    nextTrial();
  }

  // 记录按键
  keyData.push({
    subID,phase,trial:trial+1,
    key:e.key,
    rt:(performance.now()-startTime).toFixed(2)
  });

});

// ===== UI =====
function updateUI(){
  document.getElementById("tempScore").innerText=tempScore;
  document.getElementById("totalScore").innerText=totalScore;
  document.getElementById("trialText").innerText=`${phase} ${trial+1}/${totalTrial}`;
}

// ===== 结束 =====
function endExperiment(){
  document.getElementById("experiment").style.display="none";
  document.getElementById("end").style.display="block";
}

// ===== 下载 =====
function downloadTrial(){
  let csv="subID,phase,trial,pump,explosion,earn\n";
  trialData.forEach(d=>{
    csv+=`${d.subID},${d.phase},${d.trial},${d.pump},${d.explosion},${d.earn}\n`;
  });
  download(csv,"trial.csv");
}

function downloadKey(){
  let csv="subID,phase,trial,key,rt\n";
  keyData.forEach(d=>{
    csv+=`${d.subID},${d.phase},${d.trial},${d.key},${d.rt}\n`;
  });
  download(csv,"key.csv");
}

function download(content,name){
  let a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+content;
  a.download=name;
  a.click();
}

</script>

</body>
</html>
